services:
  - type: web
    name: judge0-server
    env: docker
    image:
      url: docker.io/judge0/judge0:1.13.0
    plan: free
    healthCheckPath: /system_info
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: judge0-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: judge0-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: WORKERS_MAX_QUEUE_SIZE
        value: "100"
      - key: WORKER_POLLING_FREQUENCY
        value: "1000"
      - key: MAX_CPU_TIME_LIMIT
        value: "5"
      - key: MAX_MEMORY_LIMIT
        value: "512000"
      - key: ENABLE_WAIT_RESULT
        value: "true"
      - key: MAX_QUEUE_SIZE
        value: "100"
      - key: AUTHN_HEADER
        value: ""
      - key: AUTHN_TOKEN
        value: ""

  - type: worker
    name: judge0-workers
    env: docker
    image:
      url: docker.io/judge0/judge0:1.13.0
    plan: free
    startCommand: ./scripts/workers
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: judge0-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: judge0-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: WORKERS_MAX_QUEUE_SIZE
        value: "100"
      - key: WORKER_POLLING_FREQUENCY
        value: "1000"
      - key: MAX_CPU_TIME_LIMIT
        value: "5"
      - key: MAX_MEMORY_LIMIT
        value: "512000"
      - key: AUTHN_HEADER
        value: ""
      - key: AUTHN_TOKEN
        value: ""

databases:
  - name: judge0-db
    plan: free
    databaseName: judge0
    user: judge0

