################################
# Judge0 CE Configuration
################################

REDIS_URL=redis://redis:6379/0

POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0pass

# Secret key for Rails
SECRET_KEY_BASE=change_me_to_random_64_char_hex_string_in_production

# Workers
WORKERS_MAX_QUEUE_SIZE=100
WORKER_POLLING_FREQUENCY=1000

# Sandbox limits
MAX_CPU_TIME_LIMIT=5
MAX_MEMORY_LIMIT=512000
ENABLE_WAIT_RESULT=true
